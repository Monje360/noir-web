<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOiR {Barber Club} — Volvemos pronto</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --noir-deep: #0e0d0f;
    --noir-brand: #332f33;
    --gris-claro: #beb2bd;
    --gold: #c9a96e;
    --white: #ffffff;
    --font-display: 'Playfair Display', serif;
    --font-body: 'Nunito Sans', sans-serif;
  }

  html, body { height: 100%; }

  body {
    background: var(--noir-deep);
    color: var(--gris-claro);
    font-family: var(--font-body);
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow: hidden;
    position: relative;
  }

  .bg-noir {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(201,169,110,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 560px;
  }

  .logo {
    margin: 0 auto 56px;
    opacity: 0.9;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: inline-flex;
    align-items: center;
    gap: 16px;
  }
  .tag::before, .tag::after {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--gold);
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(36px, 6vw, 58px);
    font-weight: 400;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 28px;
  }
  h1 em {
    font-style: italic;
    color: var(--gris-claro);
    display: block;
  }

  p {
    font-size: 15px;
    line-height: 1.9;
    margin-bottom: 16px;
    color: var(--gris-claro);
  }
  p.small {
    font-size: 13px;
    color: rgba(190,178,189,0.65);
    margin-top: 32px;
    margin-bottom: 0;
  }

  .actions {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.3s ease;
    background: transparent;
  }
  .btn:hover {
    background: var(--gold);
    color: var(--noir-deep);
  }
  .btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
  }

  .link {
    color: var(--gris-claro);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
    padding-bottom: 2px;
  }
  .link:hover { border-bottom-color: var(--gold); }

  .divider {
    width: 1px;
    height: 56px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 48px auto 0;
  }

  @media (max-width: 560px) {
    .logo svg { height: 48px !important; }
    h1 { font-size: 32px; }
  }
</style>
</head>
